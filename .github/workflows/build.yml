name: Build & Release Packages

on:
  push:
    tags:
      - "v*"
      - "*-beta"
      - "*-dev"
  workflow_dispatch:

jobs:
  # Briefcase for AppImages, deb and rpm (replaces custom script and fpm)
  build:
    name: Build ${{ matrix.format }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        format: [appimage, system]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-dev \
            libfuse2 binutils \
            debhelper devscripts \
            rpm

      - name: Build Package
        run: |
          briefcase package linux ${{ matrix.format }} --no-docker --no-input

      - name: Generate Checksums
        run: |
          cd dist
          for file in *; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') }}
          generate_release_notes: true
          append_body: true
  
  # for binary
  build-tarball:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.13"

        - name: Install dependencies
          run: |
            pip install pyinstaller PyQt6 psutil pyudev requests packaging platformdirs

        - name: Build with PyInstaller
          run: |
            pyinstaller --noconfirm --onedir --windowed \
            --icon "src/lufus/gui/assets/icons/lufuslogo.ico" \
            --paths "./src" \
            --add-data "src/lufus/gui/assets:lufus/gui/assets" \
            --add-data "src/lufus/gui/languages:lufus/gui/languages" \
            --add-data "src/lufus/gui/themes:lufus/gui/themes" \
            --collect-all PySide6 \
            --name "Lufus-x86_64-${{ github.ref_name }}" \
            "src/lufus/__main__.py"

        - name: Create Tarball and Checksum
          run: |
            cd dist
            tar -cvzf ../Lufus-x86_64-${{ github.ref_name }}.tar.gz Lufus-x86_64-${{ github.ref_name }}
            cd ..
            sha256sum Lufus-x86_64-${{ github.ref_name }}.tar.gz > Lufus-x86_64-${{ github.ref_name }}.tar.gz.sha256

        - name: Upload to Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ github.ref_name }}
            files: |
              Lufus-x86_64-${{ github.ref_name }}.tar.gz
              Lufus-x86_64-${{ github.ref_name }}.tar.gz.sha256
            append_body: true
            
